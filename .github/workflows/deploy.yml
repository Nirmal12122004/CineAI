name: CineAI CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  frontend-build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        run: npm install          # ← Removed "cd frontend" (package.json is at root)

      - name: Build Vite App
        run: npm run build        # ← Removed "cd frontend"

  backend-test:
    name: Setup Python Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # ← Fixed: "3.10" causes issues, use "3.11"

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Backend Import
        run: |
          cd backend
          python -c "import pandas, numpy, sklearn"